<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Відкрий у зовнішньому браузері</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #000000, #1f1f1f);
      color: white;
      padding: 20px;
      text-align: center;
    }
    .card {
      max-width: 460px;
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 32px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 40px rgba(0,0,0,.35);
    }
    h1 { font-size: 30px; margin-bottom: 16px; }
    p { font-size: 18px; line-height: 1.5; opacity: .95; }
    .steps {
      margin-top: 24px;
      text-align: left;
      font-size: 20px;
      line-height: 1.9;
    }
    .icon { font-size: 54px; margin-bottom: 20px; }
    .loader {
      margin: 24px auto 0;
      width: 42px;
      height: 42px;
      border: 4px solid rgba(255,255,255,.25);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg);} }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon">↗️</div>
    <h1 id="title">Відкрий у браузері</h1>
    <p id="desc">Щоб продовжити, відкрий це посилання у зовнішньому браузері.</p>
    <div class="steps" id="steps">
      1. Натисни <b>⋯</b> у верхньому правому куті<br>
      2. Обери <b>«Open in browser»</b><br>
      3. Зачекай автоматичний перехід
    </div>
    <div class="loader" id="loader"></div>
  </div>

  <script>
    const REDIRECT_URL = 'https://www.google.com';

    function isTikTokWebView() {
      const ua = navigator.userAgent || navigator.vendor || window.opera;
      // Типові маркери TikTok in-app browser
      return /TikTok|musical_ly|BytedanceWebview/i.test(ua);
    }

    function redirectNow() {
      document.getElementById('title').innerText = 'Перенаправлення...';
      document.getElementById('desc').innerText = 'Зараз відкриємо потрібну сторінку';
      document.getElementById('steps').style.display = 'none';
      document.getElementById('loader').style.display = 'block';

      setTimeout(() => {
        window.location.replace(REDIRECT_URL);
      }, 800);
    }

    // Логіка:
    // Якщо всередині TikTok webview -> показуємо інструкцію.
    // Якщо вже у зовнішньому браузері -> автоматичний редірект.
    if (!isTikTokWebView()) {
      redirectNow();
    }

    // debug в консоль
    console.log('UA:', navigator.userAgent);
    console.log('TikTok WebView:', isTikTokWebView());
  </script>
</body>
</html>
