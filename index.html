<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.container {
    max-width: 400px;
}

h1 {
    font-size: 24px;
    margin-bottom: 20px;
}

p {
    opacity: 0.8;
    margin-bottom: 30px;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    background: #ff0050;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    display: none;
}

button:hover {
    background: #e60045;
}
</style>

</head>
<body>

<div class="container">
    <h1>Тобі є 18+?</h1>
    <p>Підтверди, щоб продовжити</p>

    <button id="goBtn">ПРОДОВЖИТИ</button>
</div>

<script>
// 👉 редірект сюди
const redirectUrl = "https://example.com";

// перевірка на внутрішній браузер (TikTok, Insta)
function isInAppBrowser() {
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    return /TikTok|Instagram|FBAN|FBAV/i.test(ua);
}

// показ кнопки через 5 сек
setTimeout(() => {
    document.getElementById("goBtn").style.display = "inline-block";
}, 5000);

// клік
document.getElementById("goBtn").addEventListener("click", () => {

    if (isInAppBrowser()) {
        alert("Відкрий у браузері (3 точки → Відкрити в Chrome)");
    } else {
        window.location.href = redirectUrl;
    }

});
</script>

</body>
</html>
